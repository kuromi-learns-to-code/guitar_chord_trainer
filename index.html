<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chord Mastery - Custom Trainer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f7;
            padding: 50px 20px;
            color: #333;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .controls {
            margin-bottom: 20px;
            text-align: left;
        }
        .controls label { display: block; margin-top: 10px; font-size: 14px; color: #666; font-weight: bold; }
        .controls input[type="number"], .controls select {
            width: 100%; padding: 8px; margin-top: 5px;
            border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;
            font-size: 15px;
        }
        
        /* 커스텀 선택 영역 스타일 */
        #custom-area {
            margin-top: 15px;
            background: #fafafa;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            display: none; /* 초기에는 숨김 */
        }
        .category-title {
            font-size: 13px; font-weight: bold; color: #444;
            margin: 10px 0 5px 0; border-bottom: 1px solid #eee; padding-bottom: 3px;
        }
        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 8px;
        }
        .checkbox-grid label {
            margin-top: 0; font-size: 13px; color: #333; font-weight: normal;
            display: flex; align-items: center; gap: 4px; cursor: pointer;
        }

        button {
            width: 100%; padding: 12px; margin-top: 20px;
            background-color: #007aff; color: white; border: none;
            border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer;
        }
        button:hover { background-color: #005bb5; }
        #display-area {
            margin-top: 30px; min-height: 200px;
        }
        #chord-name { font-size: 36px; font-weight: bold; margin: 0; color: #111; }
        #diagram {
            font-family: "Courier New", Courier, monospace;
            font-size: 18px; line-height: 1.2; margin-top: 20px;
            background: #f9f9f9; padding: 15px; border-radius: 8px; display: none;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎸 Chord Mastery</h2>
    
    <div class="controls" id="controls">
        <label>연습 모드</label>
        <select id="mode" onchange="toggleCustomUI()">
            <option value="all">전체 무작위</option>
            <option value="Major Triads">Major 기본 (C, D, E...)</option>
            <option value="Minor Triads">Minor 기본 (Cm, Dm...)</option>
            <option value="Power Chords">Power Chords (C5, D5...)</option>
            <option value="Major 7th">Major 7th</option>
            <option value="Dominant 7th">Dominant 7th</option>
            <option value="Minor 7th">Minor 7th</option>
            <option value="9th & Extended">9th & Tension (Cadd9, D7add9...)</option>
            <option value="Suspended (sus2, sus4)">Suspended (sus4, sus2)</option>
            <option value="Diminished (dim7)">Diminished (dim7)</option>
            <option value="Add9 Chords">Add9 (Cadd9, Gadd9...)</option>,
            <option value="6th Chords">6th Chords (C6, G6...)</option>,
            <option value="custom">🛠 사용자 지정 (직접 선택)</option>
        </select>

        <!-- 사용자 지정 체크박스 영역 -->
        <div id="custom-area">
            <div style="font-size: 12px; color: #888; margin-bottom: 10px;">연습할 코드를 선택하세요:</div>
            <div id="checkbox-container"></div>
        </div>

        <label>생각할 시간 (초)</label>
        <input type="number" id="waitTime" value="3" step="0.5">

        <label>정답 확인 시간 (초)</label>
        <input type="number" id="confTime" value="2" step="0.5">
    </div>

    <button id="startBtn" onclick="toggleTraining()">시작</button>

    <div id="display-area" style="display: none;">
        <p id="chord-name">Cmaj7</p>
        <pre id="diagram"></pre>
    </div>
</div>

<script>
    const chordData = {
        "Major Triads": {
            "C": "e|-0-\nB|-1-\nG|-0-\nD|-2-\nA|-3-\nE|-x-",
            "D": "e|-2-\nB|-3-\nG|-2-\nD|-0-\nA|-x-\nE|-x-",
            "E": "e|-0-\nB|-0-\nG|-1-\nD|-2-\nA|-2-\nE|-0-",
            "F": "e|-1-\nB|-1-\nG|-2-\nD|-3-\nA|-3-\nE|-1-",
            "G": "e|-3-\nB|-0-\nG|-0-\nD|-0-\nA|-2-\nE|-3-",
            "A": "e|-0-\nB|-2-\nG|-2-\nD|-2-\nA|-0-\nE|-x-",
            "B": "e|-2-\nB|-4-\nG|-4-\nD|-4-\nA|-2-\nE|-x-"
        },
        "Minor Triads": {
            "Cm": "e|-3-\nB|-4-\nG|-5-\nD|-5-\nA|-3-\nE|-x-",
            "Dm": "e|-1-\nB|-3-\nG|-2-\nD|-0-\nA|-x-\nE|-x-",
            "Em": "e|-0-\nB|-0-\nG|-0-\nD|-2-\nA|-2-\nE|-0-",
            "Fm": "e|-1-\nB|-1-\nG|-1-\nD|-3-\nA|-3-\nE|-1-",
            "Gm": "e|-3-\nB|-3-\nG|-3-\nD|-5-\nA|-5-\nE|-3-",
            "Am": "e|-0-\nB|-1-\nG|-2-\nD|-2-\nA|-0-\nE|-x-",
            "Bm": "e|-2-\nB|-3-\nG|-4-\nD|-4-\nA|-2-\nE|-x-"
        },
        "Power Chords": {
            "C5": "e|-x-\nB|-x-\nG|-5-\nD|-5-\nA|-3-\nE|-x-",
            "D5": "e|-x-\nB|-x-\nG|-7-\nD|-7-\nA|-5-\nE|-x-",
            "E5": "e|-x-\nB|-x-\nG|-x-\nD|-2-\nA|-2-\nE|-0-",
            "F5": "e|-x-\nB|-x-\nG|-x-\nD|-3-\nA|-3-\nE|-1-",
            "G5": "e|-x-\nB|-x-\nG|-x-\nD|-5-\nA|-5-\nE|-3-",
            "A5": "e|-x-\nB|-x-\nG|-2-\nD|-2-\nA|-0-\nE|-x-",
            "B5": "e|-x-\nB|-x-\nG|-4-\nD|-4-\nA|-2-\nE|-x-"
        },
        "Major 7th": {
            "Cmaj7": "e|-0-\nB|-0-\nG|-0-\nD|-2-\nA|-3-\nE|-x-",
            "Fmaj7": "e|-0-\nB|-1-\nG|-2-\nD|-3-\nA|-x-\nE|-x-",
            "Gmaj7": "e|-2-\nB|-0-\nG|-0-\nD|-0-\nA|-2-\nE|-3-",
            "Dmaj7": "e|-2-\nB|-2-\nG|-2-\nD|-0-\nA|-x-\nE|-x-",
            "Amaj7": "e|-0-\nB|-2-\nG|-1-\nD|-2-\nA|-0-\nE|-x-"
        },
        "Dominant 7th": {
            "C7": "e|-0-\nB|-1-\nG|-3-\nD|-2-\nA|-3-\nE|-x-",
            "D7": "e|-2-\nB|-1-\nG|-2-\nD|-0-\nA|-x-\nE|-x-",
            "E7": "e|-0-\nB|-3-\nG|-1-\nD|-0-\nA|-2-\nE|-0-",
            "G7": "e|-1-\nB|-0-\nG|-0-\nD|-0-\nA|-2-\nE|-3-",
            "A7": "e|-3-\nB|-2-\nG|-2-\nD|-2-\nA|-0-\nE|-x-",
            "B7": "e|-2-\nB|-0-\nG|-2-\nD|-1-\nA|-2-\nE|-x-"
        },
        "Minor 7th": {
            "Cm7": "e|-3-\nB|-4-\nG|-3-\nD|-5-\nA|-3-\nE|-x-",
            "Dm7": "e|-1-\nB|-1-\nG|-2-\nD|-0-\nA|-x-\nE|-x-",
            "Em7": "e|-0-\nB|-0-\nG|-0-\nD|-0-\nA|-2-\nE|-0-",
            "Am7": "e|-0-\nB|-1-\nG|-0-\nD|-2-\nA|-0-\nE|-x-",
            "Bm7": "e|-2-\nB|-3-\nG|-2-\nD|-4-\nA|-2-\nE|-x-"
        },

        "9th & Extended": {
            "Cadd9": "e|-0-\nB|-3-\nG|-0-\nD|-2-\nA|-3-\nE|-x-",
            "D7add9": "e|-0-\nB|-1-\nG|-2-\nD|-0-\nA|-x-\nE|-x-",
            "Fadd9": "e|-3-\nB|-1-\nG|-2-\nD|-3-\nA|-x-\nE|-x-",
            "G9": "e|-10-\nB|-10-\nG|-10-\nD|-9-\nA|-10-\nE|-x-",
            "C9": "e|-3-\nB|-3-\nG|-3-\nD|-2-\nA|-3-\nE|-x-",
            "E7#9": "e|-x-\nB|-8-\nG|-7-\nD|-6-\nA|-7-\nE|-x-" // 일명 헨드릭스 코드
        },
                "Suspended (sus2, sus4)": {
            "Dsus4": "e|-3-\nB|-3-\nG|-2-\nD|-0-\nA|-x-\nE|-x-",
            "Dsus2": "e|-0-\nB|-3-\nG|-2-\nD|-0-\nA|-x-\nE|-x-",
            "Asus4": "e|-0-\nB|-3-\nG|-2-\nD|-2-\nA|-0-\nE|-x-",
            "Asus2": "e|-0-\nB|-0-\nG|-2-\nD|-2-\nA|-0-\nE|-x-",
            "Esus4": "e|-0-\nB|-0-\nG|-2-\nD|-2-\nA|-2-\nE|-0-"
        },
        "Diminished (dim7)": {
            "Cdim7": "e|-x-\nB|-4-\nG|-2-\nD|-4-\nA|-3-\nE|-x-",
            "C#dim7": "e|-x-\nB|-5-\nG|-3-\nD|-5-\nA|-4-\nE|-x-",
            "Ddim7": "e|-x-\nB|-6-\nG|-4-\nD|-6-\nA|-5-\nE|-x-"
        },
        "Add9 Chords": {
            "Cadd9": "e|-0-\nB|-3-\nG|-0-\nD|-2-\nA|-3-\nE|-x-",
            "Gadd9": "e|-3-\nB|-0-\nG|-2-\nD|-0-\nA|-2-\nE|-3-",
            "Aadd9": "e|-0-\nB|-0-\nG|-6-\nD|-7-\nA|-0-\nE|-x-"
        },
        "6th Chords": {
            "C6": "e|-5-\nB|-5-\nG|-5-\nD|-5-\nA|-x-\nE|-x-",
            "G6": "e|-0-\nB|-0-\nG|-0-\nD|-0-\nA|-2-\nE|-3-",
            "A6": "e|-2-\nB|-2-\nG|-2-\nD|-2-\nA|-0-\nE|-x-"
        },
    };

    let isRunning = false;
    let timeoutId = null;
    let practiceSet = [];

    // 페이지 로드 시 체크박스 UI 동적 생성
    window.onload = function() {
        const container = document.getElementById("checkbox-container");
        let html = "";
        for (let cat in chordData) {
            html += `<div class="category-title">${cat}</div>`;
            html += `<div class="checkbox-grid">`;
            for (let chord in chordData[cat]) {
                html += `<label><input type="checkbox" value="${chord}" data-category="${cat}"> ${chord}</label>`;
            }
            html += `</div>`;
        }
        container.innerHTML = html;
    };

    // '사용자 지정' 선택 시에만 체크박스 영역 보이기
    function toggleCustomUI() {
        const mode = document.getElementById("mode").value;
        const customArea = document.getElementById("custom-area");
        if (mode === "custom") {
            customArea.style.display = "block";
        } else {
            customArea.style.display = "none";
        }
    }

    function toggleTraining() {
        const btn = document.getElementById("startBtn");
        const controls = document.getElementById("controls");
        const display = document.getElementById("display-area");

        if (isRunning) {
            // 중지 로직
            isRunning = false;
            clearTimeout(timeoutId);
            btn.innerText = "시작";
            btn.style.backgroundColor = "#007aff";
            controls.style.display = "block";
            display.style.display = "none";
        } else {
            // 시작 로직
            setupPracticeSet();
            if (practiceSet.length === 0) {
                alert("연습할 코드가 선택되지 않았습니다.");
                return;
            }
            
            isRunning = true;
            btn.innerText = "중지";
            btn.style.backgroundColor = "#ff3b30";
            controls.style.display = "none";
            display.style.display = "block";
            
            nextChord();
        }
    }

    function setupPracticeSet() {
        const mode = document.getElementById("mode").value;
        practiceSet = [];
        
        if (mode === "custom") {
            // 체크된 박스만 수집
            const checkboxes = document.querySelectorAll('#checkbox-container input[type="checkbox"]:checked');
            checkboxes.forEach(cb => {
                const chordName = cb.value;
                const catName = cb.getAttribute("data-category");
                practiceSet.push({ name: chordName, diagram: chordData[catName][chordName] });
            });
        } else if (mode === "all") {
            // 전체 무작위
            for (let cat in chordData) {
                for (let chord in chordData[cat]) {
                    practiceSet.push({ name: chord, diagram: chordData[cat][chord] });
                }
            }
        } else {
            // 특정 카테고리 (Major Triads 등)
            for (let chord in chordData[mode]) {
                practiceSet.push({ name: chord, diagram: chordData[mode][chord] });
            }
        }
    }

    function nextChord() {
        if (!isRunning) return;

        const waitTime = parseFloat(document.getElementById("waitTime").value) * 1000;
        const confTime = parseFloat(document.getElementById("confTime").value) * 1000;
        
        // 무작위 코드 선택
        const target = practiceSet[Math.floor(Math.random() * practiceSet.length)];
        
        // 문제 출제 상태
        document.getElementById("chord-name").innerText = target.name;
        document.getElementById("diagram").style.display = "none";

        // 생각할 시간 후 정답 표시
        timeoutId = setTimeout(() => {
            if (!isRunning) return;
            document.getElementById("diagram").innerText = target.diagram;
            document.getElementById("diagram").style.display = "block";

            // 정답 확인 시간 후 다음 코드로
            timeoutId = setTimeout(nextChord, confTime);
        }, waitTime);
    }
</script>
</body>
</html>
